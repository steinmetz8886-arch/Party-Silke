<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Klasmeier</title>
  <style>
    :root {
      --bg1: #ff7eb3;
      --bg2: #ff758c;
      --bg3: #ff6a65;
      --card: rgba(255,255,255,0.14);
      --border: rgba(255,255,255,0.28);
      --text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: var(--text);
      text-align: center;
    }
    .card {
      width: min(100%, 640px);
      padding: 28px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(6px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.18);
    }
    .name {
      font-size: clamp(2rem, 6vw, 2.7rem);
      font-weight: 800;
      line-height: 1.1;
      margin: 0 0 18px;
      letter-spacing: 0.01em;
    }
    .text {
      font-size: clamp(1.05rem, 3.6vw, 1.25rem);
      line-height: 1.55;
      margin: 0;
      white-space: normal;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="name">Michael Klasmeier</h1>
    <p class="text">Mann von Gabi. Passionierte Läufer. Arbeitskollege von Lotte</p>
  </main>
</body>
</html>
